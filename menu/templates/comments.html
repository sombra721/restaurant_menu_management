{% extends "base.html" %}
{% load i18n %}

{% block title %}
    {% trans "發表評論" %}
{% endblock %}

{% block content %}
    <h2>{% trans "發表評論" %}</h2>

    {% if object %}
        <p>
            {% trans "餐廳" %}：{{ object.name }}
        </p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            {% trans "送出評論" %}
        </button>

        {% if object %}
            <a
                href="{% url 'restaurant_detail' object.pk %}"
                class="btn btn-default"
            >
                {% trans "取消" %}
            </a>
        {% endif %}
    </form>
{% endblock %}
