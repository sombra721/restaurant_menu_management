{% extends "base.html" %}

{% block title %}
    {{ page_title }}
{% endblock %}

{% block content %}
    <h2>{{ page_title }}</h2>

    <p>
        餐廳：{{ restaurant.name }}
    </p>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            儲存
        </button>

        <a
            href="{% url 'restaurant_detail' restaurant.pk %}"
            class="btn btn-default"
        >
            取消
        </a>
    </form>
{% endblock %}
